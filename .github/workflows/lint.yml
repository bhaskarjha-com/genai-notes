name: Repo Quality

on:
  pull_request:
  push:

jobs:
  repo-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Regenerate learner assets
        shell: pwsh
        run: ./scripts/generate_learning_assets.ps1

      - name: Ensure generated assets are committed
        shell: pwsh
        run: git diff --exit-code -- assets/data downloads generated

      - name: Verify repo structure and content standards
        shell: pwsh
        run: ./scripts/verify_repo.ps1

      - name: Run markdown quality checks
        shell: pwsh
        run: ./scripts/markdown_quality_check.ps1

      - name: Check content compliance (failure modes + exercises)
        shell: pwsh
        run: ./scripts/check_content_compliance.ps1

      - name: Check content freshness (Phase 6 gate)
        shell: pwsh
        run: ./scripts/check_freshness.ps1

      - name: Check internal link integrity
        shell: pwsh
        run: ./scripts/check_links.ps1

      - name: Check code depth (Phase 7 gate — warnings only)
        shell: pwsh
        run: ./scripts/check_depth.ps1
