site_name: GenAI Study Notes
site_description: Structured GenAI study notes from prerequisites to frontier research.
site_url: https://bhaskarjha-com.github.io/genai-notes/
repo_url: https://github.com/bhaskarjha-com/genai-notes
repo_name: bhaskarjha-com/genai-notes
edit_uri: edit/master/
docs_dir: docs
site_dir: site
use_directory_urls: false

hooks:
  - hooks/stage_docs.py

validation:
  nav:
    omitted_files: ignore
    not_found: warn
    absolute_links: relative_to_docs

exclude_docs: |
  drafts/**
  scripts/**
  _templates/**
  .github/**
  *.copy.md
  link_converter.py
  site/**
  .gitignore

theme:
  name: material
  language: en
  icon:
    logo: material/book-open-blank-variant
    repo: fontawesome/brands/github
  features:
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.prune
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.tabs.link
    - content.action.edit
    - content.action.view
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - tags

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - assets/javascripts/knowledge-graph.js
  - assets/javascripts/role-matrix.js
  - assets/javascripts/progress-tracker.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/bhaskarjha-com/genai-notes

